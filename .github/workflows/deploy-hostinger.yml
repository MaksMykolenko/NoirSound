name: Deploy to Hostinger VPS

on:
  workflow_dispatch:
  push:
    tags:
      - public-beta-*

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  ci-gate:
    name: Full CI gate
    uses: ./.github/workflows/public-beta.yml

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production
    steps:
      - name: Deploy on VPS
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_KNOWN_HOSTS: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT || '22' }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_HOST"
          test -n "$HOSTINGER_USER"
          test -n "$HOSTINGER_SSH_KEY"
          test -n "$HOSTINGER_KNOWN_HOSTS"
          test -n "$HOSTINGER_DEPLOY_PATH"
          test -n "$PRODUCTION_DOMAIN"

          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_deploy_key
          printf '%s\n' "$HOSTINGER_KNOWN_HOSTS" > ~/.ssh/known_hosts

          printf -v REMOTE_APP_DIR '%q' "$HOSTINGER_DEPLOY_PATH"
          printf -v REMOTE_REF '%q' "$WORKFLOW_REF"
          printf -v REMOTE_DOMAIN '%q' "$PRODUCTION_DOMAIN"

          ssh -p "$HOSTINGER_PORT" \
            -i ~/.ssh/hostinger_deploy_key \
            -o IdentitiesOnly=yes \
            "$HOSTINGER_USER@$HOSTINGER_HOST" \
            "APP_DIR=$REMOTE_APP_DIR DEPLOY_REF=$REMOTE_REF PRODUCTION_DOMAIN=$REMOTE_DOMAIN bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$DEPLOY_REF" >/dev/null; then
            git checkout --detach "refs/tags/$DEPLOY_REF"
          else
            git checkout "$DEPLOY_REF"
            git pull --ff-only origin "$DEPLOY_REF"
          fi
          chmod +x scripts/*.sh
          scripts/deploy-hostinger.sh
          REMOTE
