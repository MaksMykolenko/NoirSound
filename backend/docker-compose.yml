services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: noirsound_user
      POSTGRES_PASSWORD: noirsound_password
      POSTGRES_DB: noirsound_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: always
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: noirsound_minio_user
      MINIO_ROOT_PASSWORD: noirsound_minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  storage-proxy:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - minio
    ports:
      - "9000:9000"
    volumes:
      - ./docker/nginx/storage.conf:/etc/nginx/conf.d/default.conf:ro

  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 noirsound_minio_user noirsound_minio_password; do sleep 1; done;
      /usr/bin/mc mb myminio/noirsound-audio --ignore-existing;
      /usr/bin/mc anonymous set none myminio/noirsound-audio;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
