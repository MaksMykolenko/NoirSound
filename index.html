<!doctype html>
<html lang="en" data-theme="noir-pink" data-theme-preference="noir-pink">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />

    <!-- SSR-injected per-route metadata; see backend/src/lib/metaRenderer.js -->
    <!--noirsound:ssr-meta-->
    <title>NoirSound — Creator-first music platform</title>
    <meta
      name="description"
      content="Discover independent music, upload your own tracks, and build your audience on NoirSound."
    />
    <link rel="canonical" href="https://noirsound.co/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NoirSound" />
    <meta property="og:title" content="NoirSound — Creator-first music platform" />
    <meta
      property="og:description"
      content="Discover independent music, upload your own tracks, and build your audience on NoirSound."
    />
    <meta property="og:url" content="https://noirsound.co/" />
    <meta property="og:image" content="https://noirsound.co/og/noirsound-cover.png" />
    <meta property="og:image:secure_url" content="https://noirsound.co/og/noirsound-cover.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NoirSound — creator-first music platform" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NoirSound — Creator-first music platform" />
    <meta
      name="twitter:description"
      content="Discover independent music, upload your own tracks, and build your audience on NoirSound."
    />
    <meta name="twitter:image" content="https://noirsound.co/og/noirsound-cover.png" />
    <meta name="twitter:image:alt" content="NoirSound — creator-first music platform" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "NoirSound",
        "url": "https://noirsound.co",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://noirsound.co/discover?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script>
      (function () {
        var allowedThemes = [
          'noir-pink',
          'midnight-blue',
          'crimson-red',
          'royal-purple',
          'emerald-dark',
          'light-minimal',
          'green-stream',
          'orange-wave',
          'system'
        ];
        var themeBackgrounds = {
          'noir-pink': '#0a0a0c',
          'midnight-blue': '#030712',
          'crimson-red': '#070303',
          'royal-purple': '#07030f',
          'emerald-dark': '#020806',
          'light-minimal': '#f7f7fb',
          'green-stream': '#050706',
          'orange-wave': '#080604'
        };
        function syncThemeColor(themeId) {
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', themeBackgrounds[themeId] || '#0a0a0c');
        }
        try {
          var selectedTheme = localStorage.getItem('noirsound.theme') || 'noir-pink';
          if (allowedThemes.indexOf(selectedTheme) === -1) selectedTheme = 'noir-pink';
          var resolvedTheme = selectedTheme;
          if (selectedTheme === 'system') {
            resolvedTheme = window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light-minimal'
              : 'noir-pink';
          }
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.themePreference = selectedTheme;
          document.documentElement.style.colorScheme =
            resolvedTheme === 'light-minimal' ? 'light' : 'dark';
          syncThemeColor(resolvedTheme);
        } catch (error) {
          document.documentElement.dataset.theme = 'noir-pink';
          document.documentElement.dataset.themePreference = 'noir-pink';
          syncThemeColor('noir-pink');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:wght@700&family=Commissioner:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
