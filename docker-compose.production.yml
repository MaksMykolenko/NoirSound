# NoirSound production stack.
# Secrets come from .env.production (see .env.production.example). No secret has
# an insecure default here — the backend refuses to boot with weak secrets.
#
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_USE_MOCK_API: "false"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      S3_BUCKET: ${S3_BUCKET}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: "3000"
      TRUST_PROXY: "true"
      # Internal origin the backend fetches the built SPA shell from when
      # injecting server-side metadata for crawler-visible routes. Caddy's
      # internal :8080 site serves /srv statically for any Host, so this works
      # regardless of the public DOMAIN and never loops back through the SSR
      # routes.
      APP_SHELL_ORIGIN: http://web:8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    # Production migrations are run explicitly by scripts/deploy-hostinger.sh.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
    command: ["npm", "run", "worker"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO is NOT published to the host in production — only the backend/worker
  # and Caddy reach it on the internal network. Caddy exposes only signed,
  # bucket-scoped object requests; anonymous bucket access remains disabled.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    command: server /data
    volumes:
      - minio_data:/data
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-create-bucket:
    image: minio/mc
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      until mc alias set ns http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY}; do sleep 1; done;
      mc mb --ignore-existing ns/${S3_BUCKET};
      mc anonymous set none ns/${S3_BUCKET};
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
