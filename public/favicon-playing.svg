<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .bg-ring {
        animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        transform-origin: center;
      }
      .bar-1 {
        animation: eq-1 0.8s ease-in-out infinite alternate;
        transform-origin: bottom;
      }
      .bar-2 {
        animation: eq-2 0.6s ease-in-out infinite alternate;
        transform-origin: bottom;
      }
      .bar-3 {
        animation: eq-3 0.7s ease-in-out infinite alternate;
        transform-origin: bottom;
      }
      @keyframes pulse-ring {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.03); }
      }
      @keyframes eq-1 {
        0% { transform: scaleY(0.35); }
        100% { transform: scaleY(0.95); }
      }
      @keyframes eq-2 {
        0% { transform: scaleY(0.85); }
        100% { transform: scaleY(0.25); }
      }
      @keyframes eq-3 {
        0% { transform: scaleY(0.45); }
        100% { transform: scaleY(1); }
      }
    </style>
  </defs>

  <!-- Background Squircle -->
  <rect x="24" y="24" width="464" height="464" rx="140" fill="#09090b" stroke="#e11d48" stroke-width="24" />
  
  <!-- Subtle Ambient Glow Rings -->
  <circle className="bg-ring" cx="256" cy="256" r="210" fill="none" stroke="#e11d48" stroke-width="16" stroke-opacity="0.4" />
  
  <!-- Equalizer Group positioned at bottom center -->
  <g transform="translate(0, 0)">
    <!-- Bar 1 -->
    <rect className="bar-1" x="124" y="120" width="64" height="272" rx="32" fill="#f02255" />
    <!-- Bar 2 -->
    <rect className="bar-2" x="224" y="120" width="64" height="272" rx="32" fill="#f02255" />
    <!-- Bar 3 -->
    <rect className="bar-3" x="324" y="120" width="64" height="272" rx="32" fill="#f02255" />
  </g>
</svg>
